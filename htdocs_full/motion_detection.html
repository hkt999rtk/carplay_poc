<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title>Ameba PRO2 AI DEMO</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/cover.css" rel="stylesheet">
    <link href="/css/ai_canvas.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link href="/img/favicon.ico" rel="shortcut icon">
    <script type="text/javascript" src="/js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/js/ai_param.js"></script>
  </head>

  <body class="d-flex h-100 text-center text-white bg-dark">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="mb-auto">
        <div>
          <h3 class="float-md-start mb-0">Motion Detection</h3>
          <nav id="menu" class="nav nav-masthead justify-content-center float-md-end"> </nav>
        </div>
      </header>

      <main class="px-3">
        <table>
          <tr>
            <td style="padding: 10px;">
              <input class="form-check-input" type="checkbox" value="" id="motion_detection" checked>
              <label class="form-check-label" for="motion_detection">
                Motion Detection
              </label> 

              <input class="form-check-input" type="checkbox" value="" id="video_streaming" checked>
              <label class="form-check-label" for="video_streaming">
                Video Streaming
              </label>

              <input class="form-check-input" type="checkbox" value="" id="ircut">
              <label class="form-check-label" for="ircut">
                IR Cut
              </label>
              <hr>
              <input type="range" class="form-range" min="0" max="5" id="md_base" value="3">
              <label id="label_base" for="md_base" class="form-label">Sensitivity Base</label>

              <input type="range" class="form-range" min="0" max="5" id="md_lum" value="3">
              <label id = "label_lum" for="md_lum" class="form-label">Sensitivity Lum</label>

              <input type="range" class="form-range" min="1" max="100" id="md_sensitivity" value="50">
              <label id = "label_sensitivity" for="md_sensitivity" class="form-label">Sensitivity</label>

              <input type="range" class="form-range" min="5" max="24" id="isp_fps" value="20">
              <label id="label_isp_fps" for="isp_fps" class="form-label">FPS</label>
            </td>

            <td style="padding: 10px;">
              <div class="progress blue">
                <span class="progress-left">
                  <span class="progress-bar"></span>
                </span>
                <span class="progress-right">
                  <span class="progress-bar"></span>
                </span>
                <div class="progress-value"></div>
              </div>
              <h6 align="center">CPU Utilization</h6>
            </td>
          </tr>
        </table>
	      <canvas class='video_canvas' id='output_canvas' width="1920" height="1080" style="background-color: #333333;"></canvas>
      </main>
      <footer id="footer" class="mt-auto text-white-50"> </footer>
    </div>
  </body>

  <script type="text/javascript" src="/js/create_md_player.js"></script>
	<script type="text/javascript" src="/js/menu.js"></script>
	<script type="text/javascript" src="/js/decoder.js"></script>
	<script type="text/javascript" src="/js/yuv_canvas.js"></script>
	<script type="text/javascript" src="/js/player.js"></script>
	<script type="text/javascript" src="/js/ai_player.js"></script>
</html>
