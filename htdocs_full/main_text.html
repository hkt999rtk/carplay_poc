  <body class="d-flex h-100 text-center text-black bg-white">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column" style="vertical-align: middle;">
      <header class="mb-auto">
        <div>
          <!--<h1 class="float-md-start mb-0">Low Power, Fast Boot (0.6sec) AI Platform</h1>-->
          <br><br><br>
          <h1 style="font-weight: bolder; font-size: 70px; text-align: center; color: darkblue">Low Power &amp; Fast Boot (0.6sec) AI Platform</h1>
          <nav hidden id="menu" class="nav nav-masthead justify-content-center float-md-end"> </nav>
        </div>
      </header>
      <main class="px-3" tyle="width: 90%; margin: auto;">
        <!--<div style="width: 90%; margin: auto; display: flex; align-items: flex-start">-->
        <!--<img src="img/2024ces/realtek_logo.png">-->
        <div style="height: 80px;"></div>
        <table width="95%" style="text-align: left; vertical-align: middle; font-size: 50px; margin: auto;">
          <tr>
            <td class="menu_td"><p id="sound_events" class="menu_p"><img align="left" width="20%" src="img/2024ces/sound_detection.png">Sound Events</p></td>
            <td class="menu_td"><p id="object_detection" class="menu_p"><img align="left" width="20%" src="img/2024ces/object_detection.png">Object Detection</p></td>
          </tr>
          <tr>
            <td class="menu_td"><p id="face_tracking" class="menu_p"><img align="left" width="20%" src="img/2024ces/person_detection.png">Person Tracking</p></td>
            <td class="menu_td"><p id="facial_recognition" class="menu_p"><img align="left" width="20%" src="img/2024ces/facial_recognition.png">Face Recognition</td>
          </tr>
          <tr>
            <td class="menu_td"><p id="hand_gesture" class="menu_p"><img align="left" width="20%" src="img/2024ces/hand_gesture.png">Hand Gesture</td>
            <td class="menu_td"><p id="face_fusion" class="menu_p" style="font-size: 50px; font-weight: bolder;"><img id = "faceid" align="left" width="20%" src="img/2024ces/faceid.png"><span id="ai_name"></span></td>
          </tr>
        </table>
        <div style="height: 200px;"></div>
        </div>
      <footer id="footer" class="mt-auto text-white-50"> </footer>
    </div>
  </body>

	<script type="text/javascript" src="/js/menu.js"></script>
  <script type="text/javascript" src="/js/about.js"></script>
  <script type="text/javascript">
  $(document).ready(function() {
    var orderedFeature = ["sound_events", "object_detection", "face_tracking", "facial_recognition", "hand_gesture", "face_fusion"];
    load_page = (url) => {
      window.location.href = url;
    }

    show_ai_span_text = (isOn) => {
      let ai_span = document.getElementById("ai_name");
      let logo_img = document.getElementById("faceid");
      if (isOn) {
        ai_span.textContent = "Plumerai Face ID"
        logo_img.src = "img/2024ces/plumerai_faceid.png";
      } else {
        ai_span.textContent = "Multi-Model AI"
        logo_img.src = "img/2024ces/faceid.png";
      }
    }

    var previous_id = "sound_events";
    mo = (id) => {
      if (previous_id != id) {
        let e = document.getElementById(previous_id);
        if (e!=null) {
          e.style.color = "black";
        }
        e = document.getElementById(id);
        if (e!=null) {
          e.style.color = "red";
        }
        previous_id = id;
      }
    }
    const aiFlagName = "show_plumerai";
    const selName = "selected";
    var selected = parseInt(localStorage.getItem(selName));
    if (isNaN(selected))
      selected = 0;

    let e = document.getElementById(orderedFeature[selected]);
    if (e!=null) {
      e.style.color = "red";
      previous_id = orderedFeature[selected];
    }
  
    var show_plumerai = localStorage.getItem(aiFlagName) === 'true';
    show_ai_span_text(show_plumerai);
    document.addEventListener('keydown', function(event) {
      console.log("KEY:", event.key)
      event.preventDefault(); // prevent the default action (scroll / move caret)
      switch (event.key) {
        case "Tab":
          selected = (selected + 1) % orderedFeature.length;
          mo(orderedFeature[selected]);
          localStorage.setItem(selName, selected);
          break;

        case "PageDown":
          load_page(previous_id);
          break;

        case "PageUp":
          window.location.reload();
          break;

        case "e":
          show_plumerai = !show_plumerai;
          show_ai_span_text(show_plumerai);
          localStorage.setItem(aiFlagName, show_plumerai);
          break;
      }
    });
  });
  </script>
</html>
