<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title>Ameba PRO2 AI DEMO</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/cover.css" rel="stylesheet">
    <link href="/css/ai_canvas.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link href="/img/favicon.ico" rel="shortcut icon">
    <script> audioOutputCanvas = 'audio_canvas'; </script>
    <script type="text/javascript" src="/js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="/js/bootstrap.min.js"></script>
  </head>

  <body class="d-flex h-100 text-center text-white bg-dark">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="mb-auto">
        <div>
          <h3 class="float-md-start mb-0">Ameba PRO2 AI</h3>
          <nav id="menu" class="nav nav-masthead justify-content-center float-md-end"> </nav>
        </div>
      </header>

      <main class="px-3">
        <div>
          <table align="center">
            <tr>
              <td align="center">
                <h1>TOGETHER - YOLOv4 + YamNet</h1>
              </td>
              <td align="center" style="padding:20px">
                <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#info"><i class="fa fa-info-circle fa-lg"></i> Info</button>
              </td>
            </tr>
          </table>
        </div>
        <div>
          <table width="60%" align="center">
            <tr>
              <td width="60%">
                <h5 align="left" style="color:greenyellow;">Person Detection (YOLO4)</h5>
                <canvas class='hybrid_video_canvas' id='obj_canvas' style="background-color: #333333;" width="1920" height="1080"></canvas>
              </td>
              <!--
              <td>
                <h5 align="left" style="color:greenyellow;">Facial Recognition (RetinaNet)</h5>
                <canvas class='hybrid_video_canvas' id='face_canvas' style="background-color: #333333;" width="1920" height="1080"></canvas>
              </td>
              -->
            </tr>
          </table>
          <br>
          <h5 align="left" style="color:greenyellow;">Audio Event Detection (YamNet)</h5>
          <table align="center">
            <tr><td align=center>
              <img src="img/alarm.png">
                <br><br>
                <!-- <button id="btStart" type="button" class="btn btn-primary"> Start</button> -->
              </td><td style="width: 40px;"></td><td>
              <canvas class='audio_canvas' id='sound_canvas' width="960" height="240" style="background-color: #333333;"></canvas>
            </td></tr>
          </table>
        </div>
      </main>
      <footer id="footer" class="mt-auto text-white-50"> </footer>
    </div>

    <!-- Modal (Info) -->
    <div class="modal fade" id="info" tabindex="-1" role="dialog" aria-labelledby="category-title">
      <div class="modal-dialog whiteback modal-lg" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="category-title">YOLO4 Object Category</h5>
          </div>
          <div class="modal-body">
            <img src="img/brain.png" align=left>
            <p class="lead" align=left>Running multiple models at the same time with reasonable inference time is important if many detectors needed to be working at the same time.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
  </body>

  <script type="text/javascript" src="/js/create_hybrid_player.js"></script>
  <script type="text/javascript" src="/js/menu.js"></script>
	<script type="text/javascript" src="/js/decoder.js"></script>
	<script type="text/javascript" src="/js/yuv_canvas.js"></script>
	<script type="text/javascript" src="/js/player.js"></script>
	<script type="text/javascript" src="/js/ai_player.js"></script>
</html>
