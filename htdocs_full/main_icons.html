<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title>Ameba PRO2 AI DEMO</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/cover.css" rel="stylesheet">
    <link href="/css/ai_canvas.css" rel="stylesheet">
    <link href="/img/favicon.ico" rel="shortcut icon">
    <script type="text/javascript" src="/js/jquery-3.6.0.min.js"></script>
  </head>

  <body class="d-flex h-100 text-center text-black bg-white">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="mb-auto">
        <div>
          <h3 class="float-md-start mb-0">Ameba PRO2 AI Features</h3>
          <nav id="menu" class="nav nav-masthead justify-content-center float-md-end"> </nav>
        </div>
      </header>
      <main class="px-3">
        <div style="width: 80%; margin: auto;">
        <!--<img src="img/2024ces/realtek_logo.png">-->
        <table width="75%" style="text-align: center; font-size: 32px; margin: auto;">
          <tr>
            <td><img width="100%" src="img/2024ces/sound_detection.png" onclick="load_page('sound_events')" onmouseover="mo('sound_events')"><p id="sound_events">Sound Event Detection</p></td>
            <td><img width="100%" src="img/2024ces/object_detection.png" onclick="load_page('object_detection')" onmouseover="mo('object_detection')"><p id="object_detection">Object Detection</p></td>
            <td><img width="100%" src="img/2024ces/person_detection.png" onclick="load_page('face_tracking')" onmouseover="mo('face_tracking')"><p id="face_tracking">Person Tracking</p></td>
          </tr>
          <tr>
            <td><img width="100%" src="img/2024ces/facial_recognition.png" onclick="load_page('facial_recognition')" onmouseover="mo('facial_recognition')"><p id="facial_recognition">Facial Recognition</p></td>
            <td><img width="100%" src="img/2024ces/hand_gesture.png" onclick="load_page('hand_gesture')" onmouseover="mo('hand_gesture')"><p id="hand_gesture">Hand Gesture Recognition</p></td>
            <td><img width="100%" src="img/2024ces/3rd_party.png" onclick="load_page('plumerai_facial')" onmouseover="mo('plumerai_facial')"><p id="plumerai_facial"><img width=198 src="img/2024ces/plumerai.png">Model</p></td>
          </tr>
        </table>
        </div>
      <footer id="footer" class="mt-auto text-white-50"> </footer>
    </div>
  </body>

	<script type="text/javascript" src="/js/menu.js"></script>
  <script type="text/javascript" src="/js/about.js"></script>
  <script type="text/javascript">
    function load_page(url) {
      window.location.href = url;
    }
    var previous_id = "";
    function mo(id) {
      if (previous_id != id) {
        let e = document.getElementById(previous_id);
        if (e!=null) {
          e.style.color = "black";
        }
        e = document.getElementById(id);
        if (e!=null) {
          e.style.color = "red";
        }
        previous_id = id;
      }
    }
    document.addEventListener('keydown', function(event) {
      if (event.key == "PageDown") {
        load_page(previous_id);
      }
    });
  </script>
</html>
