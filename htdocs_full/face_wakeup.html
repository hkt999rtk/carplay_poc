<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title>Ameba PRO2 AI DEMO</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/cover.css" rel="stylesheet">

    <link href="/css/font-awesome.min.css" rel="stylesheet">

    <script type="text/javascript" src="/js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="/js/bootstrap.min.js"></script>
    <script>const numberOfLamps = 5;</script>
    <style>
      body {

  <body class="d-flex h-100 text-center text-white bg-white">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="mb-auto">
        <div style="display: none;">
          <h3 class="float-md-start mb-0">Ameba PRO2 AI</h3>
          <nav id="menu" class="nav nav-masthead justify-content-center float-md-end"> </nav>
        </div>
      </header>

      <main class="px-3">
        <div class=""spacer" style="height: 30px;"></div>
        <table id="ctable" width="95%" style="margin-left: auto; margin-right: auto;">
          <tr><td colspan="3">
            <div>
              <p class="lead">
                <button id="btNewReg" type="button" class="btn btn-primary" data-toggle="modal" data-target="#face_dialog"><i class="fa fa-plus fa-lg"></i> New Face</button>
                <button id="btShowReg" type="button" class="btn btn-primary" data-toggle="modal" data-target="#face_dialog"><i class="fa fa-tags fa-lg"></i> Edit Faces</button>
                <button id="btClearFaces" type="button" class="btn btn-primary" data-toggle="modal" data-target="#clear_faces"><i class="fa fa-eraser fa-lg"></i> Clear Faces</button>
              </p>
            </div>
          </td></tr>
        <tr>
          <td id="face_video" width="50%" style="vertical-align: top;">
            <canvas class='video_canvas' id='output_canvas' width="1920" height="1080" style="background-color: #333333;"></canvas>
            <div id="info">
              <br>
              <div align=left style="color:black;""><h5>Enable facial</h5></div>
              <div class="progress" style="height: 30px;">
                <div id="member" class="progress-bar progress-bar-animated bg-danger" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
              <br>
              <div align=left style="color:black;"><h5>Disable facial</h5></div>
              <div class="progress" style="height: 30px;">
                <div id="non_member" class="progress-bar progress-bar-animated bg-danger" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
            </div>
          </td>
          <td id="gpt_session" width="25%">
            <div id="conversation_box" class="container">
              <div id="title"></div>
              <div class="chat-box" id="chat-box-fast"></div>
            </div>
          </td>
          <td id="gpt_session_guest" width="25%">
            <div id="conversation_box" class="container">
              <div id="title"></div>
              <div class="chat-box" id="chat-box-slow"></div>
            </div>
          </td>
        </tr>
        </table>

      <footer id="footer" class="mt-auto text-white-50"> </footer>

    </body>

    <!-- New face dialog box -->
    <div id="face_dialog" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="category-title">
      <div class="modal-dialog whiteback modal-lg" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title" id="newface-title">New Face Registration</h4>
          </div>
          <div class="modal-body">
            <table id=newface_table class="whiteback table table-striped"><tbody></tbody></table>
          </div>
          <div class="modal-footer">
            <!-- <button id="reg_cancel" type="button" class="btn btn-warning" data-dismiss="modal">Cancel</button> -->
            <button id="reg_ok" type="button" class="btn btn-primary" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Clear all faces dialog box -->
    <div id="clear_faces" class="modal fade" tabindex="-1" role="dialog">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" style="color:black">Faces</h5>
          </div>
          <div class="modal-body">
            <p style="color:black">Are you sure to clear all registered faces?</p>
          </div>
          <div class="modal-footer">
            <button id="do_clear" type="button" class="btn btn-primary" data-dismiss="modal">Yes</button>
            <button type="button" class="btn btn-secondary" data-dismiss="modal">No</button>
          </div>
        </div>
      </div>
      <script>
        $("#do_clear").click(function() {
          videoCmdLink.unregAllFace();
        });
      </script>
  </div>

  <script type="text/javascript" src="/js/create_facial_recognition_player.js"></script>
	<script type="text/javascript" src="/js/menu.js"></script>
	<script type="text/javascript" src="/js/decoder.js"></script>
	<script type="text/javascript" src="/js/yuv_canvas.js"></script>
	<script type="text/javascript" src="/js/player.js"></script>
	<script type="text/javascript" src="/js/ai_player.js"></script>
  <script type="text/javascript">
    let updateLanguage = function() {
      const newFace = document.getElementById("btNewReg");
      const editFace = document.getElementById("btShowReg");
      const clearFace = document.getElementById("btClearFaces");
      switch (envDemo.language) {
        case langEnUS:
          newFace.innerHTML = '<i class="fa fa-plus fa-lg"></i> New Face';
          editFace.innerHTML = '<i class="fa fa-tags fa-lg"></i> Edit Faces';
          clearFace.innerHTML = '<i class="fa fa-eraser fa-lg"></i> Clear Faces';
          break;
        case langZhTW:
          newFace.innerHTML = '<i class="fa fa-plus fa-lg"></i> 新增臉部';
          editFace.innerHTML = '<i class="fa fa-tags fa-lg"></i> 編輯臉部';
          clearFace.innerHTML = '<i class="fa fa-eraser fa-lg"></i> 清除臉部';
          break;
      }
    }
    updateLanguage();

    $("#reg_ok").click(() => {
        videoCmdLink.saveFace();
    });

    $("#btNewReg").click(() => {
        videoCmdLink.regFace((resp) => {
            if (resp.status == "ok") {
                let p = resp.value;
                let genHTML = '<thead class="thead-dark"><tr><td>ID</td><td>Face thumbnail</td><td>Name</td><td>Rename</td></tr></thead>'
                genHTML += '<tbody><tr><td>' + p.faceid + '</td><td><canvas id="thumbnail" width=112 height=112></td><td id="facename">' + p.name + '</td>'
                genHTML += '<td><input type="text" id="new_name" maxlength="16"> '
                genHTML += '<button id="rename" type="button" class="btn btn-primary btn-sm"> Set</button></td></tr></tbody>';
                $("#newface_table").html(genHTML);
                let binary = atob(p.thumbnail);
                let srcData = new Uint8Array(binary.length)
                for(let i = 0; i < binary.length; i++ ) { srcData[i] = binary.charCodeAt(i) }
                let thumbnail = document.getElementById("thumbnail");
                let ctx = thumbnail.getContext('2d');
                let myData = ctx.createImageData(112, 112);
                let d = myData.data;
                let rs = 0, gs = 112*112, bs = 112*112*2;
                for (let i=0; i<112*112*4; i+=4) {
                    d[i] = srcData[rs];
                    d[i+1] = srcData[gs];
                    d[i+2] = srcData[bs];
                    d[i+3] = 255;
                    rs++; gs++; bs++;
                }
                ctx.putImageData(myData, 0, 0);
                $("#rename").click(() => {
                    videoCmdLink.renameFace(p.faceid, $("#new_name").val());
                });
            } else {
                $("#fail_body").html("<p>Fail in registering new face. Reason: " + resp.result.status + "</p>");
            }
            videoCmdLink.activeFaceId = p.faceid;
        });
    });

    $("#btShowReg").click(() => {
        videoCmdLink.getRegFace((resp) => {
            updateFaceTable(resp);
        })
    });
</script>
<script src="js/facial_cb.js"></script>
</html>
