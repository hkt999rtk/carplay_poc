<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title>Ameba PRO2 AI DEMO</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/cover.css" rel="stylesheet">
    <link href="/css/ai_canvas.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link href="/img/favicon.ico" rel="shortcut icon">
    <script> audioOutputCanvas = 'audio_canvas'; </script>
    <script type="text/javascript" src="/js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="/js/bootstrap.min.js"></script>
  </head>

  <body class="d-flex h-100 text-center text-white bg-dark">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="mb-auto">
        <div>
          <h3 class="float-md-start mb-0">Ameba PRO2 AI</h3>
          <nav id="menu" class="nav nav-masthead justify-content-center float-md-end"> </nav>
        </div>
      </header>

      <main class="px-3">
        <div>
          <table align="center">
            <tr>
              <td>
                <div>
                <h1>Guesture Control</h1>
                <p>展示 AmebaPRO2 如何偵測手勢，並使用手勢來與設備互動</p>
                <ol>
                  <li>請站立於攝影機前，用右手食指比出 1 讓 AmebaPRO2 進入提醒模式，螢幕上的綠燈亮起</li>
                </ol>
                </div>
              </td>
              <td align="center" style="padding:20px">
                <button type="button" id="switch_3d" class="btn btn-success">Swith to 3D hands</button>
                <button type="button" id="switch_2d" class="btn btn-success">Switch to 2D hands</button>
              </td>
            </tr>
          </table>
        </div>
        <div>
          <table width="100%" align="center">
            <tr>
              <td width="25%">
                <canvas class='video_canvas' id='left_hand' style='background-color: #333333;' width='224' height='224'></canvas>
                <canvas class='video_canvas' id='left_hand_3d' style='background-color: #333333;' width='224' height='224'></canvas>
              </td>
              <td width="50%">
                <canvas hidden class='video_canvas' id='decoder' style='background-color: #333333;' width='1920' height='1080'> </canvas>
                <canvas class='video_canvas' id='disp_canvas' style='background-color: #333333;' width='1080' height='1080'></canvas>
              </td>
              <td width="25%">
                <canvas class='video_canvas' id='right_hand' style="background-color: #333333;" width="224" height="224"></canvas>
                <canvas class='video_canvas' id='right_hand_3d' style="background-color: #333333;" width="224" height="224"></canvas>
              </td>
            </tr>
          </table>
        </div>
      </main>
      <footer id="footer" class="mt-auto text-white-50"> </footer>
    </div>
  </body>

  <script type="text/javascript" src="/js/create_hands_player.js"></script>
  <script type="text/javascript" src="/js/menu.js"></script>
	<script type="text/javascript" src="/js/decoder.js"></script>
	<script type="text/javascript" src="/js/yuv_canvas.js"></script>
	<script type="text/javascript" src="/js/player.js"></script>
	<script type="text/javascript" src="/js/ai_player.js"></script>
</html>
