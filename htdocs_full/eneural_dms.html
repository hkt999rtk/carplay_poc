<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title>Ameba PRO2 AI DEMO</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/cover.css" rel="stylesheet">
    <link href="/css/ai_canvas.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link href="/img/favicon.ico" rel="shortcut icon">
    <script type="text/javascript" src="/js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/js/ai_param.js"></script>
  </head>

  <body class="d-flex h-100 text-center text-white bg-dark">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="mb-auto">
        <div>
          <h3 class="float-md-start mb-0">eNeural DMS (Driver Monitoring System)
          <button hidden=true type="button" class="btn btn-primary" data-toggle="modal" data-target="#category"><i class="fa fa-book fa-lg"></i>Category</button>
          <button id="video_button" type="button" class="btn btn-primary" onclick="startStopVideoRecord()"><i class="fa fa-video-camera fa-lg"></i> Video Record</button>
          </h3>
          <nav id="menu" class="nav nav-masthead justify-content-center float-md-end"> </nav>
        </div>
      </header>

      <main class="px-3">
        <table>
          <tr style="display:none">
            <td style="padding: 10px;">
              <input class="form-check-input" type="checkbox" value="" id="object_detection" checked>
              <label class="form-check-label" for="object_detection">
                Object Detection
              </label>
              <input class="form-check-input" type="checkbox" value="" id="video_streaming" checked>
              <label class="form-check-label" for="video_streaming">
                Video Streaming
              </label>
              <input class="form-check-input" type="checkbox" value="" id="ircut">
              <label class="form-check-label" for="ircut">
                IR Cut
              </label><hr>
              <input type="range" class="form-range" min="0" max="100" id="od_confidence" value="70">
              <label id="label_confidence" for="od_confidence" class="form-label">Confidence</label>

              <input type="range" class="form-range" min="0" max="100" id="od_nms_threshold" value="30">
              <label id = "label_nms_threshold" for="od_nms_threshold" class="form-label">NMS</label>

              <input type="range" class="form-range" min="5" max="24" id="isp_fps" value="20">
              <label id="label_isp_fps" for="isp_fps" class="form-label">FPS</label>
            </td>
            <td style="padding: 10px;">
              <div class="progress blue" align="center">
                <span class="progress-left">
                  <span class="progress-bar"></span>
                </span>
                <span class="progress-right">
                  <span class="progress-bar"></span>
                </span>
                <div class="progress-value"></div>
              </div>
              <h6 align="center">CPU Utilization</h6>
            </td>
          </tr>
        </table>
	      <canvas class='video_canvas' id='output_canvas' width="1920" height="1080" style="background-color: #333333; width: 95%;"></canvas>
      </main>


      <footer id="footer" class="mt-auto text-white-50"> </footer>
    </div>

    <!-- Modal (Show category) -->
    <div class="modal fade" id="category" tabindex="-1" role="dialog" aria-labelledby="category-title">
      <div class="modal-dialog whiteback modal-lg" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="category-title"> Object Detection Category</h5>
          </div>
          <div class="modal-body">
          <table class="whiteback table table-striped"><tbody>
            <script>
              var objectName = ["closed_eye", "closed_mouth", "face", "open_eye", "open_mouth", "cigarette", "cell_phone", "seatbelt"]
              var count = 0;
              var itemsPerRow = 5;
              document.write("<div class='form-check'>");
              for (var row = 0; row < (objectName.length/itemsPerRow)|0; row++) {
                document.write("<tr>");
                for (var col = 0; col < itemsPerRow; col++) {
                  if (count < objectName.length) {
                    document.write("<td>" + "<input class='form-check-input' type='checkbox' id='cb_" + objectName[count] + "'> " + objectName[count] + "</td>");
                  } else {
                    document.write("<td></td>");
                  }
                  count++;
                }
                document.write("</tr>");
              }
              document.write("</div>");
            </script>
          </tbody></table>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
  </body>

  <script type="text/javascript" src="/js/create_od_player.js"></script>
	<script type="text/javascript" src="/js/menu.js"></script>
	<script type="text/javascript" src="/js/decoder.js"></script>
	<script type="text/javascript" src="/js/yuv_canvas.js"></script>
	<script type="text/javascript" src="/js/player.js"></script>
	<script type="text/javascript" src="/js/ai_player.js"></script>
  <script type="text/javascript">
    document.addEventListener('keydown', function(event) {
      event.preventDefault(); // prevent the default action (scroll / move caret)
      if (event.key == "PageUp") {
        window.location.href = "main";  
      }
    });

    var videoIsRecording = false;
    updateVideoRecordButton = function() {
      var videoButton = document.getElementById("video_button");
      if (videoIsRecording) {
        videoButton.classList.remove("btn-primary");
        videoButton.classList.add("btn-danger");
      } else {
        videoButton.classList.remove("btn-danger");
        videoButton.classList.add("btn-primary");
      }
    }
    startStopVideoRecord = function() {
      if (!videoIsRecording) {
        videoCmdLink.startMp4Record(300); // record 300s (5 minutes)
      } else {
        videoCmdLink.stopMp4Record();
      }
      videoIsRecording = !videoIsRecording;
      updateVideoRecordButton();
    }
    videoRecordCallback = function(isRecording) {
      if (isRecording == 1) {
        videoIsRecording = true;
      } else {
        videoIsRecording = false;
      }
      updateVideoRecordButton();
    }
  </script>
</html>
