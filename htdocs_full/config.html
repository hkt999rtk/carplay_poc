<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title>Ameba PRO2 AI DEMO</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/cover.css" rel="stylesheet">
    <link href="/css/ai_canvas.css" rel="stylesheet">
    <link href="/img/favicon.ico" rel="shortcut icon">
    <script type="text/javascript" src="/js/jquery-3.6.0.min.js"></script>
  </head>

  <body class="d-flex h-100 text-center text-white bg-dark">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="mb-auto">
        <div>
          <h3 class="float-md-start mb-0">Ameba PRO2 AI</h3>
          <nav id="menu" class="nav nav-masthead justify-content-center float-md-end"> </nav>
        </div>
      </header>
      <main class="px-3">
        <br>
        <h1>Ameba PRO2 DEMO Configuration</h1><br>
        <img src="img/brain.png" align=left>
        <div>
          <table>
            <tr><th align="center">Video 1 Setting</th><th id="video2_title" align="center">Video 2 Setting</th></tr>
            <tr>
              <td style="padding:10px">
                <form>
                  <div id="video1" class="form-group">
                    <label for="width">Width</label>
                    <input type="text" class="form-control" id="v1_width">
                    <label for="width">Height</label>
                    <input type="text" class="form-control" id="v1_height">
                    <label for="bitrate">Bitrate</label>
                    <input type="text" class="form-control" id="v1_bitrate">
                    <label for="fps">FPS</label>
                    <input type="text" class="form-control" id="v1_fps">
                    <label for="gop">GOP</label>
                    <input type="text" class="form-control" id="v1_gop">
                    <label for="minqp">Min QP</label>
                    <input type="text" class="form-control" id="v1_minqp">
                    <label for="maxqp">Max QP</label>
                    <input type="text" class="form-control" id="v1_maxqp">
                    <label for="deltaqp">Delta QP (for smart bitrate)</label>
                    <input type="text" class="form-control" id="v1_deltaqp">
                  </div>
                </form>
              </td>
              <td>
                <form>
                  <div id="video2" class="form-group">
                    <label for="width">Width</label>
                    <input type="text" class="form-control" id="v2_width">
                    <label for="width">Height</label>
                    <input type="text" class="form-control" id="v2_height">
                    <label for="bitrate">Bitrate</label>
                    <input type="text" class="form-control" id="v2_bitrate">
                    <label for="fps">FPS</label>
                    <input type="text" class="form-control" id="v2_fps">
                    <label for="gop">GOP</label>
                    <input type="text" class="form-control" id="v2_gop">
                    <label for="minqp">Min QP</label>
                    <input type="text" class="form-control" id="v2_minqp">
                    <label for="maxqp">Max QP</label>
                    <input type="text" class="form-control" id="v2_maxqp">
                    <label for="deltaqp">Delta QP (for smart bitrate)</label>
                    <input type="text" class="form-control" id="v2_deltaqp">
                  </div>
                </form>
              </td>
            </tr>
          </table>
        </div>
        <button id="reload_config" type="button" class="btn btn-primary">Reload</button>
        <button id="save_config" type="button" class="btn btn-primary">Save</button>
        <button id="device_reset" type="button" class="btn btn-danger">Reset</button>
      </main>
      <br>
      <div id="pdiv" class="progress">
        <div id="progressbar" class="progress-bar progress-bar-danger progress-bar-striped" role="progressbar"
        aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width:0%">
        </div>
      </div>
      <footer id="footer" class="mt-auto text-white-50"> </footer>
    </div>
  </body>

	<script type="text/javascript" src="/js/menu.js"></script>
  <script type="text/javascript" src="/js/config.js"></script>
</html>
