<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CarPlay Stream Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111318;
      color: #f3f6fb;
    }

    main {
      box-sizing: border-box;
      width: min(1200px, 100%);
      margin: 0 auto;
      padding: 24px 16px 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 600;
    }

    p {
      margin: 0;
      color: #aeb9c8;
    }

    #status {
      margin: 16px 0 20px;
      padding: 12px 14px;
      border: 1px solid #2b3442;
      border-radius: 12px;
      background: #181d25;
      font-size: 14px;
    }

    .panel {
      margin-top: 16px;
      padding: 12px;
      border-radius: 16px;
      background: #0d1015;
      border: 1px solid #202733;
    }

    canvas {
      display: block;
      width: 100%;
      background: #000;
      border-radius: 12px;
    }

    #output_canvas {
      aspect-ratio: 16 / 9;
    }

    #sound_canvas {
      margin-top: 12px;
      aspect-ratio: 16 / 2.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>CarPlay Stream Viewer</h1>
    <p>WebSocket video/audio only. Minimal stream viewer.</p>
    <div id="status">Connecting...</div>
    <div class="panel">
      <canvas id="output_canvas" width="1920" height="1080"></canvas>
      <canvas id="sound_canvas" width="1920" height="320"></canvas>
    </div>
  </main>

  <script src="/js/decoder.js"></script>
  <script src="/js/yuv_canvas.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/crypto_stream.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
